# GoReleaser configuration for gopm.
# https://goreleaser.com
#
# gopm ships as a Go binary (gopm-bin) plus a Bash wrapper (gopm) that sources
# gopm-core.sh and performs the actual cd+exec. Every artifact therefore bundles
# the binary + wrapper + core script + shell completions. Runtime deps: jq, bash.
#
# Validate locally:  goreleaser check
# Dry-run a release:  goreleaser release --snapshot --clean
version: 2

project_name: gopm

before:
  hooks:
    - go mod tidy

builds:
  - id: gopm
    main: ./cmd/gopm
    binary: gopm-bin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    # Flat layout: the wrapper resolves its siblings (gopm-bin, gopm-core.sh).
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      # Flatten packaging/gopm -> gopm at the archive root so the wrapper sits
      # beside its siblings (gopm-bin, gopm-core.sh).
      - src: packaging/*
        strip_parent: true
      - gopm-core.sh
      - completion.bash
      - completion.zsh
      - gopm-integration.zsh
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Debian / RPM packages installed into FHS locations. The wrapper finds
# gopm-core.sh in /usr/share/gopm and the binary in /usr/bin.
nfpms:
  - id: gopm
    package_name: gopm
    vendor: Martin Harvan
    homepage: https://github.com/martinhrvn/go-pm
    maintainer: Martin Harvan <martinhrvn@gmail.com>
    description: Fast TUI for running commands across projects in a monorepo.
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - jq
      - bash
    bindir: /usr/bin
    contents:
      - src: packaging/gopm
        dst: /usr/bin/gopm
        file_info:
          mode: 0755
      - src: gopm-core.sh
        dst: /usr/share/gopm/gopm-core.sh
      - src: gopm-integration.zsh
        dst: /usr/share/gopm/gopm-integration.zsh
      - src: completion.bash
        dst: /usr/share/bash-completion/completions/gopm
      - src: completion.zsh
        dst: /usr/share/zsh/site-functions/_gopm
      - src: LICENSE
        dst: /usr/share/licenses/gopm/LICENSE

# Homebrew tap (cask — `brews` formulae are deprecated in GoReleaser v2).
# The cask symlinks gopm + gopm-bin into the Homebrew bin; the gopm wrapper
# resolves the symlink back to its Caskroom staging dir to find gopm-core.sh.
# Requires a martinhrvn/homebrew-tap repo; uploads are skipped automatically
# until it exists (and on snapshot builds).
homebrew_casks:
  - name: gopm
    repository:
      owner: martinhrvn
      name: homebrew-tap
      # Pushing to a separate tap repo needs a PAT with write access stored as
      # the HOMEBREW_TAP_TOKEN secret. Falls back to GITHUB_TOKEN if unset.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/martinhrvn/go-pm
    description: Fast TUI for running commands across projects in a monorepo.
    license: MIT
    skip_upload: auto
    dependencies:
      - formula: jq
    binaries:
      - gopm-bin
      - gopm
    completions:
      bash: completion.bash
      zsh: completion.zsh

# AUR PKGBUILD. With generate-only publishing we do not push to the AUR git
# repo from CI; the generated PKGBUILD ships as a release artifact for a manual
# first publish. Set skip_upload to "false" and add an SSH deploy key later to
# automate pushes.
aurs:
  - name: gopm-bin
    homepage: https://github.com/martinhrvn/go-pm
    description: Fast TUI for running commands across projects in a monorepo.
    license: MIT
    maintainers:
      - "Martin Harvan <martinhrvn@gmail.com>"
    skip_upload: true
    git_url: ssh://aur@aur.archlinux.org/gopm-bin.git
    depends:
      - jq
      - bash
    package: |-
      # binary
      install -Dm755 "./gopm-bin" "${pkgdir}/usr/bin/gopm-bin"
      # wrapper
      install -Dm755 "./gopm" "${pkgdir}/usr/bin/gopm"
      # core + integration
      install -Dm644 "./gopm-core.sh" "${pkgdir}/usr/share/gopm/gopm-core.sh"
      install -Dm644 "./gopm-integration.zsh" "${pkgdir}/usr/share/gopm/gopm-integration.zsh"
      # completions
      install -Dm644 "./completion.bash" "${pkgdir}/usr/share/bash-completion/completions/gopm"
      install -Dm644 "./completion.zsh" "${pkgdir}/usr/share/zsh/site-functions/_gopm"
      # license
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/gopm-bin/LICENSE"

release:
  github:
    owner: martinhrvn
    name: go-pm
  draft: false
  prerelease: auto
